<mat-card class="page-card">
  <div class="card-header">
    <div class="header-icon"><mat-icon>straighten</mat-icon></div>
    <div>
      <div class="header-title">Unit</div>
      <div class="header-subtitle">Manage measurement units</div>
    </div>
    <span class="header-spacer"></span>
    <button mat-flat-button class="add-btn" (click)="add()"><mat-icon>add</mat-icon> Add Unit</button>
  </div>
  <div class="table-toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="search" (ngModelChange)="onSearch()" placeholder="Search unit...">
    </mat-form-field>
  </div>
  <div class="table-container" [class.table-loading]="loading">
    @if (loading) { <div class="loading-overlay"><mat-spinner diameter="36"></mat-spinner></div> }
    <table mat-table [dataSource]="data" class="data-table">
      <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let r; let i = index">{{ (page-1)*pageSize+i+1 }}</td></ng-container>
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Unit Name</th><td mat-cell *matCellDef="let r">{{ r.name }}</td></ng-container>
      <ng-container matColumnDef="display_name"><th mat-header-cell *matHeaderCellDef>Print Name</th><td mat-cell *matCellDef="let r">{{ r.display_name || '—' }}</td></ng-container>
      <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span class="chip" [class.status-active]="r.status==1" [class.status-inactive]="r.status!=1">{{ r.status==1?'Active':'Inactive' }}</span></td></ng-container>
      <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r"><button mat-icon-button color="primary" (click)="edit(r)"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="delete(r)"><mat-icon>delete</mat-icon></button></td></ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let r; columns: displayedColumns;"></tr>
      @if (!loading && data.length === 0) { <tr class="mat-row"><td class="mat-cell no-data" [attr.colspan]="displayedColumns.length"><mat-icon>straighten</mat-icon><p>No units found</p></td></tr> }
    </table>
    <mat-paginator [length]="total" [pageSize]="pageSize" [pageSizeOptions]="[10,25,50]" (page)="onPage($event)" showFirstLastButtons></mat-paginator>
  </div>
</mat-card>
