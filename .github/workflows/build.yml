name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --base-href ./

      - name: Generate icon for Windows
        if: matrix.platform == 'windows'
        run: |
          python -m venv C:\iconvenv
          C:\iconvenv\Scripts\pip install Pillow --quiet
          C:\iconvenv\Scripts\python scripts/generate-icon.py win

      - name: Generate icon for macOS
        if: matrix.platform == 'mac'
        run: |
          python3 -m venv /tmp/iconvenv
          /tmp/iconvenv/bin/pip install Pillow --quiet
          /tmp/iconvenv/bin/python scripts/generate-icon.py mac

      - name: Package with electron-builder (Windows)
        if: matrix.platform == 'windows'
        run: npx electron-builder --win --publish never

      - name: Package with electron-builder (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ErpCloudLite-${{ matrix.platform }}
          path: |
            electron-dist/*.exe
            electron-dist/*.dmg
            electron-dist/*.zip
          if-no-files-found: ignore
          retention-days: 30
