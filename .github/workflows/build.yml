name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --base-href ./

      - name: Generate 512x512 icon for macOS
        if: matrix.platform == 'mac'
        run: |
          sips -z 512 512 public/favicon.ico --out public/icon-512.png || \
          convert public/favicon.ico[0] -resize 512x512 public/icon-512.png

      - name: Package with electron-builder (Windows)
        if: matrix.platform == 'windows'
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package with electron-builder (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ErpCloudLite-${{ matrix.platform }}
          path: |
            electron-dist/*.exe
            electron-dist/*.dmg
            electron-dist/*.zip
          if-no-files-found: ignore
          retention-days: 30
